# Copy to .github/workflows/ci.yml after scaffolding.
# Delete the job(s) that don't apply to your app. All jobs must be green to merge.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web — lint, format, typecheck, unit tests, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint --max-warnings 0
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  api:
    name: API — ruff, mypy, pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync # installs from uv.lock incl. dev group
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv run pytest

  e2e:
    name: E2E — Playwright user journeys (mobile + desktop)
    runs-on: ubuntu-latest
    needs: [web] # don't burn E2E minutes if unit gates fail; add `api` if backend exists
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      # Uncomment when the app has a Python backend (playwright webServer starts it):
      # - uses: astral-sh/setup-uv@v5
      # - run: uv sync
      #   working-directory: apps/api
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
